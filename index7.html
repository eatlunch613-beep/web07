<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="專業咖啡拉花課程，從基礎到進階，打造你的職人級咖啡藝術技能。" />
  <title>咖啡拉花職人課程</title>

  <style>
    :root {
      --dark-bg: #111827;
      --primary: #b45309;
      --light-bg: #f9fafb;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Noto Sans TC", sans-serif;
    }

    body {
      background: var(--light-bg);
      color: var(--dark-bg);
      line-height: 1.6;
    }

    /* Header - Flexbox 一維對齊 */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: var(--dark-bg);
      color: white;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .btn {
      background: var(--primary);
      color: white;
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    /* Hero */
    .hero {
      padding: 80px 40px;
      text-align: center;
      background: linear-gradient(
        135deg,
        rgba(17, 24, 39, 0.95),
        rgba(180, 83, 9, 0.85)
      );
      color: white;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto;
      opacity: 0.9;
    }

    /* Features - Grid 二維排版 */
    .features {
      padding: 60px 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      border-top: 4px solid var(--primary);
    }

    .card h3 {
      margin-bottom: 10px;
      color: var(--dark-bg);
    }

    .card p {
      color: #4b5563;
      font-size: 14px;
    }

    /* CTA */
    .cta {
      text-align: center;
      padding: 60px 40px;
      background: var(--dark-bg);
      color: white;
    }

    .cta h2 {
      margin-bottom: 12px;
    }

    .cta p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #6b7280;
    }

    /* 手機響應式 */
    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .features {
        grid-template-columns: 1fr;
        padding: 40px 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">咖啡拉花職人課程</div>
    <button class="btn">立即報名</button>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>從零開始，成為拉花職人</h1>
    <p>
      這堂課將帶你從基礎義式咖啡萃取，到進階奶泡控制與拉花技巧，
      讓你在家也能做出咖啡館等級的藝術作品。
    </p>
  </section>

  <!-- Features -->
  <section class="features">
    <div class="card">
      <h3>基礎咖啡理論</h3>
      <p>學習咖啡豆種類、烘焙程度與風味分析，建立完整知識基礎。</p>
    </div>

    <div class="card">
      <h3>奶泡控制技巧</h3>
      <p>掌握溫度與氣泡密度，做出絲滑穩定的微細奶泡。</p>
    </div>

    <div class="card">
      <h3>實戰拉花訓練</h3>
      <p>從心型到葉子圖案，循序漸進打造專業級拉花作品。</p>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <h2>現在就開始你的咖啡職人之路</h2>
    <p>名額有限，立即加入下一梯次課程</p>
    <button class="btn">立即報名課程</button>
  </section>

  <!-- Footer -->
  <footer>
    © 2026 咖啡拉花職人課程. All rights reserved.
  </footer>

</body>

</html>
