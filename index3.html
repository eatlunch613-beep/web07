<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Header 範例</title>

    <style>
        /* 重置樣式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 20px 60px;
            background-color: #2c3e50;
        }

        /* Logo */
        .logo a {
            color: white;
            text-decoration: none;
            font-size: 28px;
            font-weight: bold;
        }

        /* 導覽列 */
        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #f39c12;
        }
    </style>
</head>

<body>

    <!-- 網頁頂部導覽列 -->
    <header>

        <!-- Logo -->
        <div class="logo">
            <a href="#">MyLogo</a>
        </div>

        <!-- 導覽選單 -->
        <nav>
            <a href="#">首頁</a>
            <a href="#">關於我們</a>
            <a href="#">服務項目</a>
            <a href="#">作品集</a>
            <a href="#">聯絡我們</a>
        </nav>

    </header>

</body>
</html>
