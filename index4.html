<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>精品咖啡商品列表</title>

  <!-- ===================== CSS 區塊 ===================== -->
  <style>
    /* 外層區塊 */
    .coffee-section {
      padding: 40px;
      background: #f6f2ec;
    }

    /* Grid 容器（3欄固定） */
    .coffee-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* 商品卡片 */
    .coffee-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .coffee-card h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #2c2c2c;
    }

    .coffee-card p {
      font-size: 14px;
      line-height: 1.6;
      color: #666;
    }

    .price {
      margin-top: 14px;
      font-weight: bold;
      color: #8b5e3c;
      font-size: 15px;
    }
  </style>
</head>

<body>

  <!-- ===================== HTML 結構區塊 ===================== -->
  <section class="coffee-section">

    <div class="coffee-grid">

      <article class="coffee-card">
        <h3>衣索比亞 耶加雪菲</h3>
        <p>花香與柑橘調性明亮，酸質細緻乾淨，適合手沖與精品咖啡入門。</p>
        <div class="price">NT$ 450</div>
      </article>

      <article class="coffee-card">
        <h3>哥倫比亞 薇拉</h3>
        <p>焦糖與堅果香氣平衡，口感圓潤滑順，適合日常飲用。</p>
        <div class="price">NT$ 420</div>
      </article>

      <article class="coffee-card">
        <h3>巴拿馬 藝伎</h3>
        <p>高級花香與熱帶水果調性，層次豐富且極具精品特色。</p>
        <div class="price">NT$ 1200</div>
      </article>

      <article class="coffee-card">
        <h3>瓜地馬拉 安提瓜</h3>
        <p>可可與香料風味明顯，厚實飽滿，帶有深焙魅力。</p>
        <div class="price">NT$ 380</div>
      </article>

      <article class="coffee-card">
        <h3>肯亞 AA</h3>
        <p>黑醋栗與莓果酸香突出，風味強烈且層次鮮明。</p>
        <div class="price">NT$ 500</div>
      </article>

      <article class="coffee-card">
        <h3>巴西 喜拉朵</h3>
        <p>堅果與巧克力風味為主，口感柔和順口，適合每天飲用。</p>
        <div class="price">NT$ 350</div>
      </article>

    </div>

  </section>

</body>

</html>
