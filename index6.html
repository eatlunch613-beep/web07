<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSS Variables 區塊</title>

<style>
  /* 1. 全域變數集中管理 */
  :root {
    --brand-primary: #a609b4;
    --text-dark: #42341b;
    --text-soft: #e6d990;
    --bg-soft: #f7c1ac;
    --bg-dark: #ec6f35;
  }

  /* 2. 基礎重置 */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-soft);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* 3. 區塊容器 */
  .card {
    background-color: var(--bg-dark);
    border: 1px solid var(--brand-primary);
    padding: 32px;
    border-radius: 12px;
    max-width: 420px;
    text-align: center;
  }

  /* 標題 */
  .card h1 {
    color: var(--brand-primary);
    font-size: 24px;
    margin-bottom: 12px;
  }

  /* 內文 */
  .card p {
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  /* 按鈕 */
  .btn {
    display: inline-block;
    padding: 10px 18px;
    background-color: var(--brand-primary);
    color: var(--bg-soft);
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
  }

  .btn:hover {
    opacity: 0.85;
  }
</style>
</head>

<body>

<section class="card">
  <h1>品牌主打標題</h1>
  <p>
    這是一段示範內文，所有顏色都透過 CSS Variables 控制。
    只要修改 :root，就能快速切換整體品牌風格，而不用動到任何 CSS 結構。
  </p>
  <a href="#" class="btn">立即行動</a>
</section>

</body>
</html>
